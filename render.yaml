services:
  - type: web
    name: nexora-backend
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: procurement-db
          property: connectionString
      - key: SYNC_DATABASE_URL
        fromDatabase:
          name: procurement-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false # You must set this manually in the Render dashboard

databases:
  - name: procurement-db
    databaseName: procurement
    user: postgres
    plan: free
